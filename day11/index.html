<!DOCTYPE html>
<html>
<head>
    <title>Input Events Example</title>
    <script src="colors.js"></script>
</head>

<body>

<h2>Form with Input Events</h2>

<form>

<label>Input Box 1:</label>
<input type="text" onfocus="changeColor(this)">
<br><br>

<label>Input Box 2:</label>
<input type="text" onblur="convertUpper(this)">
<br><br>

</form>

</body>
</html>
